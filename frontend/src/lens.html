<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background: transparent;
  overflow: hidden;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  pointer-events: none;
}
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

/* Top bar */
#lens-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  background: rgba(2, 9, 18, 0.88);
  border: 1px solid rgba(56,189,248,0.4);
  border-top: none; border-radius: 0 0 10px 10px;
  padding: 5px 18px;
  display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(12px);
  pointer-events: auto;
}
#lens-bar .dot {
  width:6px; height:6px; border-radius:50%;
  background:#22d3ee; box-shadow:0 0 8px #22d3ee;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#lens-bar .label { color:#38bdf8; font-size:10px; letter-spacing:3px; }
#lens-bar .status { color:rgba(148,163,184,0.5); font-size:9px; }

/* Single insight card — top right */
#card {
  position: fixed;
  top: 52px; right: 20px;
  width: 380px;
  background: rgba(2, 9, 18, 0.88);
  border-radius: 10px;
  backdrop-filter: blur(16px);
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: translateX(20px);
  pointer-events: auto;
}
#card.visible {
  opacity: 1;
  transform: translateX(0);
}
#card-border { position:absolute; inset:0; border-radius:10px; pointer-events:none; }

#card-header {
  padding: 8px 12px;
  display: flex; align-items:center; justify-content:space-between;
  background: rgba(6,18,38,0.6);
}
#card-icon { font-size:11px; }
#card-time { color:rgba(148,163,184,0.4); font-size:8px; }
#card-close {
  width:18px; height:18px; border:none; background:transparent;
  color:rgba(148,163,184,0.4); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
  pointer-events: auto;
  transition: color 0.15s;
}
#card-close:hover { color: #f87171; }

#card-sep { height:1px; background: rgba(56,189,248,0.15); }

#card-body {
  padding: 12px 14px 10px;
  color: #e2e8f0; font-size:12px; line-height:1.6;
  font-family: 'Exo 2', 'Segoe UI', sans-serif;
  font-weight: 300;
}

#card-footer {
  padding: 5px 12px 8px;
  background: rgba(6,18,38,0.4);
  display:flex; justify-content:flex-end; align-items:center; gap:8px;
}
#card-footer .hist-btn {
  font-size:8px; letter-spacing:1px;
  color:rgba(56,189,248,0.5); background:transparent;
  border:none; cursor:pointer; padding:2px 6px;
  pointer-events:auto;
  transition:color 0.15s;
}
#card-footer .hist-btn:hover { color:#38bdf8; }

/* History panel */
#history {
  position: fixed;
  top: 52px; right: 20px;
  width: 380px; max-height: 60vh;
  background: rgba(2,9,18,0.92);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius:10px;
  backdrop-filter: blur(16px);
  display:none; flex-direction:column;
  pointer-events:auto; overflow:hidden;
}
#history.open { display:flex; }
#history-header {
  padding:10px 14px;
  border-bottom:1px solid rgba(56,189,248,0.1);
  display:flex; justify-content:space-between; align-items:center;
  color:#38bdf8; font-size:10px; letter-spacing:2px;
}
#history-close {
  background:transparent; border:none; color:rgba(148,163,184,0.4);
  cursor:pointer; font-size:14px;
}
#history-list {
  overflow-y:auto; padding:10px;
  flex:1;
}
.hist-entry {
  padding:8px 10px; margin-bottom:6px;
  background:rgba(6,18,38,0.5);
  border-radius:6px;
  border-left:2px solid rgba(56,189,248,0.3);
  animation: entry-in 0.2s ease;
}
@keyframes entry-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.hist-entry .ht { color:rgba(56,189,248,0.5); font-size:8px; margin-bottom:3px; }
.hist-entry .hb { color:#94a3b8; font-size:11px; font-family:'Exo 2',sans-serif; font-weight:300; line-height:1.5; }
</style>
</head>
<body>

<!-- Lens bar -->
<div id="lens-bar">
  <div class="dot"></div>
  <span class="label">V.N.S.A  LENS</span>
  <span class="status" id="lens-status">watching...</span>
</div>

<!-- Insight card -->
<div id="card">
  <div id="card-border"></div>
  <div id="card-header">
    <span id="card-icon">◈</span>
    <span id="card-time"></span>
    <button id="card-close" onclick="dismissCard()">✕</button>
  </div>
  <div id="card-sep"></div>
  <div id="card-body" id="card-text"></div>
  <div id="card-footer">
    <button class="hist-btn" onclick="toggleHistory()">📋 history</button>
  </div>
</div>

<!-- History -->
<div id="history">
  <div id="history-header">
    <span>LENS HISTORY</span>
    <button id="history-close" onclick="toggleHistory()">✕</button>
  </div>
  <div id="history-list"></div>
</div>

<script>
const { ipcRenderer } = require('electron');

const CAT_COLORS = {
  suggestion: '#38bdf8',
  warning:    '#fbbf24',
  action:     '#22d3ee',
  info:       '#4a6880',
  reminder:   '#a78bfa',
};
const CAT_ICONS = {
  suggestion: '◈',
  warning:    '⚠',
  action:     '◉',
  info:       '◌',
  reminder:   '⏰',
};

const historyData = [];
let cardTimeout = null;

ipcRenderer.on('insight', (_, data) => {
  showInsight(data);
});

function showInsight(data) {
  const card  = document.getElementById('card');
  const border = document.getElementById('card-border');
  const body  = document.getElementById('card-body');
  const icon  = document.getElementById('card-icon');
  const time  = document.getElementById('card-time');
  const status = document.getElementById('lens-status');

  const cat   = data.category || 'info';
  const color = CAT_COLORS[cat] || CAT_COLORS.info;

  // Update card content
  icon.textContent  = CAT_ICONS[cat] || '◌';
  icon.style.color  = color;
  time.textContent  = data.time || new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  body.textContent  = data.insight || '';
  border.style.border  = `1px solid ${color}40`;
  border.style.boxShadow = `inset 0 0 20px ${color}08`;

  // Show
  card.classList.add('visible');
  status.textContent = data.insight?.substring(0, 40) + '...';

  // Add to history
  historyData.unshift(data);
  refreshHistory();

  // Auto-dismiss after 12s
  if (cardTimeout) clearTimeout(cardTimeout);
  cardTimeout = setTimeout(() => dismissCard(), 12000);
}

function dismissCard() {
  document.getElementById('card').classList.remove('visible');
  document.getElementById('lens-status').textContent = 'watching...';
}

function toggleHistory() {
  const h = document.getElementById('history');
  h.classList.toggle('open');
  dismissCard();
}

function refreshHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  historyData.forEach(e => {
    const el  = document.createElement('div');
    el.className = 'hist-entry';
    const cat = e.category || 'info';
    el.style.borderLeftColor = CAT_COLORS[cat] || CAT_COLORS.info;
    el.innerHTML = `
      <div class="ht">${CAT_ICONS[cat] || '◌'} ${e.time || ''}</div>
      <div class="hb">${e.insight || ''}</div>
    `;
    list.appendChild(el);
  });
}
</script>
</body>
</html>
